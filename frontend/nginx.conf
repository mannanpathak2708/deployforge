server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Proxy API + Actuator to the backend service.
    # 'taskmanager.deployforge.svc.cluster.local' resolves via kube-dns inside the cluster.
    location ~ ^/(api|actuator)/ {
        proxy_pass         http://taskmanager.deployforge.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: all other routes serve index.html so React Router (if added) works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html so users get latest deploys
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long cache for hashed assets
    location ~* \.(js|css|png|jpg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
