apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: deployforge

# secret.example.yaml is intentionally NOT listed — the real Secret is created
# by Ansible from vault values and applied separately.
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - rbac.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/part-of: deployforge
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/deployforge/taskmanager
    newTag: latest
