apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: deployforge
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: taskmanager-secrets
          # Tell Postgres to create its data dir under a subpath so initdb does
          # not collide with the lost+found dir on some EBS volumes.
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser", "-d", "taskdb"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "taskuser"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # `local-path` provisioner is installed by Ansible (Stage 3) — it's the
        # simplest dynamic provisioner for a kubeadm cluster without EBS CSI.
        # Swap to `gp3` if you wire up the AWS EBS CSI driver later.
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: deployforge
  labels:
    app: postgres
spec:
  clusterIP: None       # headless — used for stable DNS within the cluster
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
