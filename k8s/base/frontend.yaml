apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: deployforge
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: frontend
          # Patched at deploy time to point at your ECR
          image: 560205084884.dkr.ecr.us-east-1.amazonaws.com/deployforge/frontend:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 80 }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: deployforge
  labels: { app: frontend }
spec:
  type: NodePort
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081     # Hit http://<master-ip>:30081 from your browser
      name: http
