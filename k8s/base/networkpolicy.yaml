# ---------------------------------------------------------------------------
# Default deny + selective allow. Hardens the app pod so only legitimate
# clients (the NGINX ingress controller and Prometheus) can reach it.
# Requires a CNI that enforces NetworkPolicy — Calico is installed by Ansible.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: taskmanager-allow
  namespace: deployforge
spec:
  podSelector:
    matchLabels:
      app: taskmanager
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Allow database access within the same namespace
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
