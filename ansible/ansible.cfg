# ============================================================================
#  ansible.cfg — settings for the DeployForge cluster bootstrap.
#
#  Why these settings:
#    - host_key_checking=False: EC2 instances change SSH host keys frequently
#      (re-creates, etc.) and prompts would block automation.
#    - pipelining=True: huge speedup. Bundles multiple commands into a single
#      SSH session instead of opening a new one per task.
#    - forks=10: parallelism. Default 5 is fine for 3 hosts but 10 covers
#      future scale-out without tuning.
# ============================================================================

[defaults]
inventory               = ./inventory.ini
host_key_checking       = False
remote_user             = ubuntu
private_key_file        = ~/.ssh/deployforge-key.pem
roles_path              = ./roles
collections_paths       = ~/.ansible/collections
forks                   = 10
gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = /tmp/ansible-facts
fact_caching_timeout    = 3600
stdout_callback         = default
result_format           = yaml
deprecation_warnings    = False
interpreter_python      = /usr/bin/python3
retry_files_enabled     = False

[ssh_connection]
pipelining        = True
ssh_args          = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
control_path_dir  = /tmp/.ansible-cp

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False
