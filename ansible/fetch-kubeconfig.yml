---
# ============================================================================
#  fetch-kubeconfig.yml — copy the admin kubeconfig to your local Mac so
#  you can run kubectl directly without SSHing to the master every time.
#
#  Usage:
#    ansible-playbook fetch-kubeconfig.yml
#    export KUBECONFIG=~/.kube/deployforge.config
#    kubectl get nodes
# ============================================================================

- name: Fetch kubeconfig from master and rewrite for external access
  hosts: master
  become: true
  vars:
    local_kubeconfig: "~/.kube/deployforge.config"

  tasks:
    - name: Read remote admin.conf
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.conf
      register: remote_kubeconfig

    - name: Get master public IP from inventory
      ansible.builtin.set_fact:
        master_public_ip: "{{ ansible_host }}"

    - name: Decode and rewrite server URL to use public IP
      ansible.builtin.copy:
        content: >-
          {{ remote_kubeconfig.content | b64decode
             | regex_replace('server: https://[0-9.]+:6443',
                             'server: https://' + master_public_ip + ':6443') }}
        dest: "{{ local_kubeconfig }}"
        mode: "0600"
      delegate_to: localhost
      become: false

    - name: Show next steps
      ansible.builtin.debug:
        msg:
          - "Kubeconfig saved to {{ local_kubeconfig }}"
          - "To use it:"
          - "  export KUBECONFIG={{ local_kubeconfig }}"
          - "  kubectl get nodes"
          - ""
          - "NOTE: kubeconfig has cert SAN for {{ master_public_ip }}, but if your"
          - "master IP changes (instance recreated, etc.), this kubeconfig will"
          - "stop working. Re-run this playbook to refresh."
